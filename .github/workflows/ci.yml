name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  flutter-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate l10n
        run: flutter gen-l10n

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  supabase-check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Show Supabase version
        run: supabase --version

      - name: Start local DB
        run: supabase db start

      - name: Reset migrations
        run: supabase db reset --local --yes

      - name: Lint schema
        run: supabase db lint --local --fail-on error

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup

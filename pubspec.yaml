name: shiftflow_flutter
description: "ShiftFlow Flutter + Supabase unified app"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^16.2.0
  supabase_flutter: ^2.10.2
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  file_picker: ^10.3.2
  image_picker: ^1.2.0
  url_launcher: ^6.3.2
  flutter_local_notifications: ^19.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true
